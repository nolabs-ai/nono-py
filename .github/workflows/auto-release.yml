name: Auto-release on version bump

# This is the only release workflow. PyPI Trusted Publishing validates the
# workflow path that requests the OIDC token, so keep the PyPI upload in this
# file and configure PyPI's trusted publisher for auto-release.yml.
#
# Human release process:
# 1. Open a normal PR that bumps all version metadata.
# 2. Review and merge the PR to main.
# 3. This workflow publishes to PyPI, then creates the git tag and GitHub release.

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml
      - Cargo.toml
      - python/nono_py/__init__.py
      - .github/workflows/auto-release.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect release state
    if: github.repository == 'nolabs-ai/nono-py'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
      needs_publish: ${{ steps.detect.outputs.needs_publish }}
      needs_tag: ${{ steps.detect.outputs.needs_tag }}
      needs_release: ${{ steps.detect.outputs.needs_release }}
      any_work: ${{ steps.detect.outputs.any_work }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect version and outstanding work
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PY_VERSION=$(python3 - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as pyproject:
              print(tomllib.load(pyproject)["project"]["version"])
          PY
          )
          CARGO_VERSION=$(python3 - <<'PY'
          import tomllib

          with open("Cargo.toml", "rb") as cargo:
              print(tomllib.load(cargo)["package"]["version"])
          PY
          )
          INIT_VERSION=$(python3 - <<'PY'
          import ast

          tree = ast.parse(open("python/nono_py/__init__.py", encoding="utf-8").read())
          for node in tree.body:
              if isinstance(node, ast.Assign):
                  for target in node.targets:
                      if isinstance(target, ast.Name) and target.id == "__version__":
                          print(ast.literal_eval(node.value))
                          raise SystemExit
          raise SystemExit("__version__ not found in python/nono_py/__init__.py")
          PY
          )
          if [ "$PY_VERSION" != "$CARGO_VERSION" ] || [ "$PY_VERSION" != "$INIT_VERSION" ]; then
            echo "::error::version mismatch: pyproject.toml=$PY_VERSION Cargo.toml=$CARGO_VERSION python/nono_py/__init__.py=$INIT_VERSION"
            exit 1
          fi

          PYPI_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/nono-py/${PY_VERSION}/json")
          case "$PYPI_STATUS" in
            200)
              NEEDS_PUBLISH=false
              ;;
            404)
              NEEDS_PUBLISH=true
              ;;
            *)
              echo "::error::unexpected PyPI status for nono-py ${PY_VERSION}: ${PYPI_STATUS}"
              exit 1
              ;;
          esac

          git fetch --force --tags origin
          NEEDS_TAG=true
          if git rev-parse -q --verify "refs/tags/v${PY_VERSION}" >/dev/null; then
            NEEDS_TAG=false
          fi

          NEEDS_RELEASE=true
          if gh release view "v${PY_VERSION}" >/dev/null 2>&1; then
            NEEDS_RELEASE=false
          fi

          ANY_WORK=false
          if [ "$NEEDS_PUBLISH" = true ] || [ "$NEEDS_TAG" = true ] || [ "$NEEDS_RELEASE" = true ]; then
            ANY_WORK=true
          fi

          echo "version=${PY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "needs_publish=${NEEDS_PUBLISH}" >> "$GITHUB_OUTPUT"
          echo "needs_tag=${NEEDS_TAG}" >> "$GITHUB_OUTPUT"
          echo "needs_release=${NEEDS_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "any_work=${ANY_WORK}" >> "$GITHUB_OUTPUT"

          echo "version=${PY_VERSION} needs_publish=${NEEDS_PUBLISH} needs_tag=${NEEDS_TAG} needs_release=${NEEDS_RELEASE}"

  build-sdist:
    name: Build source distribution
    needs: detect
    if: needs.detect.outputs.needs_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  build-wheels-linux:
    name: Build wheels (Linux ${{ matrix.arch }})
    needs: detect
    if: needs.detect.outputs.needs_publish == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
            target: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
            target: aarch64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python3.10 python3.11 python3.12 python3.13 python3.14
          manylinux: auto
          before-script-linux: |
            if command -v dnf &> /dev/null; then
              dnf install -y dbus-devel pkgconfig
            elif command -v yum &> /dev/null; then
              yum install -y dbus-devel pkgconfig
            fi

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-linux-${{ matrix.arch }}
          path: dist/*.whl

  build-wheels-macos:
    name: Build wheels (macOS ${{ matrix.target }})
    needs: detect
    if: needs.detect.outputs.needs_publish == 'true'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python3.10 python3.11 python3.12 python3.13 python3.14

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-macos-${{ matrix.target }}
          path: dist/*.whl

  publish-pypi:
    name: Publish to PyPI
    needs: [detect, build-sdist, build-wheels-linux, build-wheels-macos]
    runs-on: ubuntu-latest
    if: needs.detect.outputs.needs_publish == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/nono-py
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Validate distribution versions
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          files = sorted(path.name for path in Path("dist").iterdir() if path.is_file())
          distributions = [
              name
              for name in files
              if name.endswith(".whl") or name.endswith(".tar.gz")
          ]
          if not distributions:
              raise SystemExit("no distributions found in dist/")

          expected_prefix = f"nono_py-{version}"
          wrong_version = [
              name for name in distributions if not name.startswith(expected_prefix)
          ]
          if wrong_version:
              raise SystemExit(
                  "distribution version mismatch for expected "
                  f"{version}: {', '.join(wrong_version)}"
              )

          if not any(name.endswith(".tar.gz") for name in distributions):
              raise SystemExit("missing source distribution")
          if not any(name.endswith(".whl") for name in distributions):
              raise SystemExit("missing wheels")

          print(f"validated {len(distributions)} distributions for {version}")
          PY

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  tag-and-release:
    name: Tag and GitHub release
    needs: [detect, publish-pypi]
    if: |
      always() &&
      needs.detect.outputs.any_work == 'true' &&
      (needs.detect.outputs.needs_publish == 'false' || needs.publish-pypi.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Create and push tag
        if: needs.detect.outputs.needs_tag == 'true'
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub release
        if: needs.detect.outputs.needs_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          set -euo pipefail
          PRERELEASE_FLAG=""
          if echo "${VERSION}" | grep -qE '(alpha|beta|rc)'; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "v${VERSION}" \
            --title "Release v${VERSION}" \
            --generate-notes \
            ${PRERELEASE_FLAG}
